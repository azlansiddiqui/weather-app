<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

</head>
<body>
    <!-- Main container -->
    <div class="container">
        <!-- Weather card with glassmorphism effect -->
        <div class="weather-card">
            <!-- Header with title and dark mode toggle -->
            <div class="card-header">
                <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>
                <button id="darkModeToggle" class="dark-mode-btn" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>

            <!-- Search section -->
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                >
                <button id="searchBtn">
                    <i class="fas fa-search"></i>
                </button>
            </div>

            <!-- Error message -->
            <div id="errorMessage" class="error-message hidden">
                <i class="fas fa-exclamation-circle"></i>
                <span>City not found. Please try again.</span>
            </div>

            <!-- Loading spinner -->
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>

            <!-- Weather display section -->
            <div id="weatherDisplay" class="weather-display hidden">
                <!-- Main weather info -->
                <div class="main-weather">
                    <h2 id="cityName">--</h2>
                    <div class="weather-icon-container">
                        <img id="weatherIcon" src="" alt="Weather icon">
                    </div>
                    <div class="temperature">
                        <span id="temperature">--</span><span class="unit">°C</span>
                    </div>
                    <p id="condition" class="condition">--</p>
                    <p id="description" class="description">--</p>
                </div>

                <!-- Weather details grid -->
                <div class="weather-details">
                    <div class="detail-item">
                        <i class="fas fa-temperature-half"></i>
                        <div>
                            <span class="detail-label">Feels Like</span>
                            <span id="feelsLike" class="detail-value">--°</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-droplet"></i>
                        <div>
                            <span class="detail-label">Humidity</span>
                            <span id="humidity" class="detail-value">--%</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-wind"></i>
                        <div>
                            <span class="detail-label">Wind Speed</span>
                            <span id="windSpeed" class="detail-value">-- m/s</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-gauge-high"></i>
                        <div>
                            <span class="detail-label">Pressure</span>
                            <span id="pressure" class="detail-value">-- hPa</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast Section -->
            <div id="forecastSection" class="forecast-section hidden">
                <h3><i class="fas fa-calendar-days"></i> 5-Day Forecast</h3>
                <div id="forecastList" class="forecast-list">
                    <!-- Forecast items will be added here by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript file -->
    <script src="app.js"></script>
</body>
</html>
